<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首次安全设置 - OpenAI 注册系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <style>
        .setup-wrap {
            max-width: 500px;
            margin: 8vh auto 0;
        }
        .setup-card {
            padding: var(--spacing-lg);
        }
        .setup-title {
            margin-bottom: var(--spacing-sm);
        }
        .setup-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .setup-alert {
            border-radius: var(--radius);
            padding: var(--spacing-sm) var(--spacing-md);
            margin-bottom: var(--spacing-md);
            font-size: 0.875rem;
        }
        .setup-alert.error {
            background: var(--danger-light);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        .setup-alert.info {
            background: var(--info-light);
            color: var(--info-color);
            border: 1px solid var(--info-color);
        }
    </style>
</head>
<body>
<div>{% include "partials/site_notice.html" %}</div>
<div class="container">
    <div class="setup-wrap">
        <div class="card setup-card">
            <div class="card-header">
                <h3 class="setup-title">🔐 首次安全设置</h3>
                <div class="setup-subtitle">
                    检测到默认访问密码或默认密钥。为避免未授权访问，需先完成改密后再进入系统。
                </div>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="setup-alert error">{{ error }}</div>
                {% endif %}
                {% if message %}
                <div class="setup-alert info">{{ message }}</div>
                {% endif %}
                <form method="post" action="/setup-password">
                    <div class="form-group">
                        <label for="old_password">当前访问密码</label>
                        <input type="password" id="old_password" name="old_password" autocomplete="current-password" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="new_password">新访问密码（至少 8 位）</label>
                        <input type="password" id="new_password" name="new_password" autocomplete="new-password" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">确认新密码</label>
                        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8" required>
                    </div>
                    <div class="form-actions" style="margin-top: var(--spacing-lg);">
                        <button type="submit" class="btn btn-primary" style="width: 100%">保存并进入登录页</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
    {% include "partials/site_footer.html" %}
</body>
</html>
